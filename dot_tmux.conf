# Change prefix to Ctrl-a (easier on laptop keyboards)
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Better splits that work well on laptop screens
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind h split-window -h -c "#{pane_current_path}"  # Alternative for laptops
bind v split-window -v -c "#{pane_current_path}"  # Alternative for laptops
unbind '"'
unbind %

# Smart pane switching with LazyVim awareness
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?|ranger)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'

# Laptop-friendly pane resizing (using arrow keys)
bind-key -r H resize-pane -L 5
bind-key -r J resize-pane -D 5
bind-key -r K resize-pane -U 5
bind-key -r L resize-pane -R 5

# Alternative resize with Shift+Arrow (no prefix needed)
bind-key -n S-Left resize-pane -L 2
bind-key -n S-Right resize-pane -R 2
bind-key -n S-Up resize-pane -U 1
bind-key -n S-Down resize-pane -D 1

# Quick pane creation
bind-key c new-window -c "#{pane_current_path}"

# Enable mouse support (great for laptops with touchpad)
set -g mouse on

# Start windows and panes at 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when closed
set -g renumber-windows on

# Increase scrollback (useful on smaller laptop screens)
set -g history-limit 50000

# Faster command sequences
set -s escape-time 10

# Stay in copy mode on drag end
unbind -T copy-mode-vi MouseDragEnd1Pane

# Laptop screen optimizations
set -g status-left-length 20
set -g status-right-length 50

# Better colors for laptop displays
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Status bar optimization for smaller screens
set -g status-bg colour235
set -g status-fg colour255
set -g status-left '#[fg=colour46]#S #[fg=colour39]#I:#P'
set -g status-right '#(/home/linuxbrew/.linuxbrew/bin/gitmux -cfg $HOME/.gitmux.conf "#{pane_current_path}") | #[fg=colour39]%H:%M %d-%B-%Y'
set -g status-interval 2

# Window status
setw -g window-status-current-style 'fg=colour81 bg=colour238 bold'
setw -g window-status-current-format ' #I#[fg=colour250]:#[fg=colour255]#W#[fg=colour50]#F '

# Reload config
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded!"

# Quick window switching (useful on laptops)
bind-key -n M-1 select-window -t 1
bind-key -n M-2 select-window -t 2
bind-key -n M-3 select-window -t 3
bind-key -n M-4 select-window -t 4
bind-key -n M-5 select-window -t 5

# Copy mode with laptop-friendly keys
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel 'xclip -in -selection clipboard'
bind-key -T copy-mode-vi Enter send -X copy-pipe-and-cancel 'xclip -in -selection clipboard'

# Power Management Integration:
#set -g status-right '#[fg=colour46]#{battery_percentage} #[fg=colour39]%H:%M %d-%b'

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux'

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
